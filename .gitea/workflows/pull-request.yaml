name: pull-request

on:
  pull_request:
    branches:
      - master

concurrency:
  group: pull-request-${{ gitea.ref }}
  cancel-in-progress: true

env:
  CI: 1

jobs:
  bump-version:
    container:
      image: catthehacker/ubuntu:act-latest
    runs-on: linux
    timeout-minutes: 10
    steps:
      - uses: https://gitea.ai/actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - run: sh ./.repo/actions/bump-version.sh

  markdownlint:
    container:
      image: catthehacker/ubuntu:act-latest
    runs-on: linux
    timeout-minutes: 10
    steps:
      - uses: https://gitea.ai/actions/checkout@v6.0.2
      - run: sh ./.repo/actions/markdownlint.sh

  prettier:
    container:
      image: catthehacker/ubuntu:act-latest
    runs-on: linux
    timeout-minutes: 10
    steps:
      - uses: https://gitea.ai/actions/checkout@v6.0.2
      - run: sh ./.repo/actions/prettier.sh

  shellcheck:
    container:
      image: catthehacker/ubuntu:act-latest
    runs-on: linux
    timeout-minutes: 10
    steps:
      - uses: https://gitea.ai/actions/checkout@v6.0.2
      - run: sh ./.repo/actions/shellcheck.sh

  shfmt:
    container:
      image: catthehacker/ubuntu:act-latest
    runs-on: linux
    timeout-minutes: 10
    steps:
      - uses: https://gitea.ai/actions/checkout@v6.0.2
      - run: sh ./.repo/actions/shfmt.sh

  taplo:
    container:
      image: catthehacker/ubuntu:act-latest
    runs-on: linux
    timeout-minutes: 10
    steps:
      - uses: https://gitea.ai/actions/checkout@v6.0.2
      - run: sh ./.repo/actions/taplo.sh

  tests:
    container:
      image: catthehacker/ubuntu:act-latest
    runs-on: linux
    timeout-minutes: 10
    steps:
      - uses: https://gitea.ai/actions/checkout@v6.0.2
      - run: sh ./.repo/actions/test.sh
