# Included via conf-dir in the main dnsmasq config; path depends on platform.

# Don't read /etc/resolv.conf — all server entries are below.
no-resolv

# Route LAN suffixes to the local resolver and tailnet suffixes to
# Tailscale's MagicDNS; fall back to public resolvers for everything else.
server=/.ai/192.168.90.11
server=/.internal/192.168.90.11
server=/.lan/192.168.90.11
server=/.qrt/192.168.90.11
server=/tail.net/100.100.100.100
server=8.8.8.8
server=1.1.1.1

# Only listen on loopback so the daemon isn't reachable from the network.
listen-address=127.0.0.1
bind-interfaces

cache-size=1000
