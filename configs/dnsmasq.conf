# /opt/homebrew/etc/dnsmasq.d/dnsmasq.conf

# Don't read /etc/resolv.conf — all server entries are below.
no-resolv

# Route internal/tailnet suffixes to Tailscale's MagicDNS resolver;
# fall back to public resolvers for everything else.
server=/.ai/100.100.100.100
server=/.home/100.100.100.100
server=/.qrt/100.100.100.100
server=/tail.net/100.100.100.100
server=8.8.8.8
server=1.1.1.1

# Only listen on loopback so the daemon isn't reachable from the network.
listen-address=127.0.0.1
bind-interfaces

cache-size=1000
