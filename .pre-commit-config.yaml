repos:
  - repo: https://github.com/dycw/pre-commit-hooks
    rev: 0.0.53
    hooks:
      - id: elm
      - id: markdown
      - id: no-binary
      - id: no-commit
      - id: notebook
      - id: prettier
      - id: python
      - id: shell-exec
      - id: shell-non-exec
        exclude: \.?(bash|zsh)_?(profile|rc)(_managed)?
      - id: shellcheck
        exclude: (bash|zsh)rc-managed\.(bash|zsh)
      - id: shfmt
        exclude: zshrc-managed\.zsh
      - id: text
      - id: universal
