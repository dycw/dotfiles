# =============================================================================
# settings
# =============================================================================

# -----------------------------------------------------------------------------
# server settings
# -----------------------------------------------------------------------------
set-option -g default-terminal "screen-256color"
set-option -g escape-time 1
set-option -g focus-events on
set-option -g history-file ~/.backups/tmux/tmux_history
set-option -g history-limit 100000

# -----------------------------------------------------------------------------
# session settings
# -----------------------------------------------------------------------------
set-option -g base-index 1
set-option -g bell-action none
set-option -g display-panes-active-colour white
set-option -g display-panes-colour white
set-option -g display-panes-time 2000
set-option -g mouse on
set-option -g renumber-windows on
set-option -g repeat-time 250
set-option -g status on
set-option -g status-interval 1
set-option -g status-justify left
set-option -g status-keys vi
set-option -g status-left ""
set-option -g status-left-length 0
set-option -g status-position bottom
set-option -g status-right "#(TZ=Asia/Hong_Kong date \"+%%Y-%%m-%%d %%H:%%M:%%S (%%a)\")"
set-option -g status-right-length 25
set-option -g status-style "bg=black"
set-option -g visual-activity off
set-option -g visual-bell off
set-option -g visual-silence off

# -----------------------------------------------------------------------------
# window settings
# -----------------------------------------------------------------------------
set-option -g allow-rename off
set-option -g clock-mode-style 12
set-option -g main-pane-height 12
set-option -g mode-keys vi
set-option -g pane-active-border-style "fg=blue,bold,bg=default"
set-option -g pane-base-index 1
set-option -g pane-border-format ""
set-option -g pane-border-status top
set-option -g pane-border-style "fg=blue,bold,bg=default"
set-option -g window-active-style "fg=default,bg=default"
set-option -g window-size largest
set-option -g window-status-current-style "fg=default,bg=default"
set-option -g window-status-style "fg=default,bg=default"
set-option -g window-status-separator ""

# status formats
set-option -g window-status-format ' #[fg=white,bold]#{window_index} #(echo "#{pane_current_path}" | rev | cut -d'/' -f-1 | rev)#([ #{window_zoomed_flag} -eq 1 ] && echo " <Z>" || echo "") #[default]'
set-option -g window-status-current-format '#[fg=white,bold,bg=blue,bold] #{window_index} #(echo "#{pane_current_path}" | rev | cut -d'/' -f-1 | rev)#([ #{window_zoomed_flag} -eq 1 ] && echo " <Z>" || echo "") #[default]'

# pane styles
set-option -g window-style "fg=default,bg=default"

# =============================================================================
# key bindings
# =============================================================================
# -----------------------------------------------------------------------------
# prefix
# -----------------------------------------------------------------------------
unbind C-b
set-option -g prefix `
bind ` send-prefix

# -----------------------------------------------------------------------------
# windows
# -----------------------------------------------------------------------------
bind-key u new-window -a -c "#{pane_current_path}"
bind-key S command-prompt -p "Swap with window #" "swap-window -t '%%'"

# -----------------------------------------------------------------------------
# panes
# -----------------------------------------------------------------------------
bind-key -r N split-window -hb -c "#{pane_current_path}" # left
bind-key -r E split-window -v  -c "#{pane_current_path}" # down
bind-key -r I split-window -vb -c "#{pane_current_path}" # up
bind-key -r O split-window -h  -c "#{pane_current_path}" # right
bind-key -r n select-pane -L # left
bind-key -r e select-pane -D # down
bind-key -r i select-pane -U # up
bind-key -r o select-pane -R # right
bind-key -r l select-pane -l # previous
bind-key h select-layout even-vertical
bind-key v select-layout even-horizontal
bind-key t select-layout tiled
bind-key s command-prompt -p "Swap with pane #" "swap-pane -t '%%'"
bind-key -r > rotate-window -U
bind-key -r < rotate-window -D
bind-key b break-pane -d
bind-key g choose-window "join-pane -dh -t '%%'" # go to window
bind-key j choose-window "join-pane -h -s '%%'"  # join from window
bind-key -r C-n resize-pane -L 5
bind-key -r C-e resize-pane -D 3
bind-key -r C-i resize-pane -U 3
bind-key -r C-o resize-pane -R 5

# -----------------------------------------------------------------------------
# reload
# -----------------------------------------------------------------------------
bind-key R source-file ~/.tmux.conf \; display-message "Reloaded"

# -----------------------------------------------------------------------------
# kill
# -----------------------------------------------------------------------------
bind-key x confirm-before "kill-pane"
bind-key X confirm-before "kill-window"
bind-key k confirm-before "kill-session"
bind-key K confirm-before "kill-server"

# -----------------------------------------------------------------------------
# copy mode
# -----------------------------------------------------------------------------
bind-key c copy-mode
bind-key -T copy-mode-vi n send -X jump-backward        # left to character
bind-key -T copy-mode-vi N send -X jump-to-backward     # left past character
bind-key -T copy-mode-vi o send -X jump-forward         # right to character
bind-key -T copy-mode-vi O send -X jump-to-forward      # right past character
bind-key -T copy-mode-vi f send -X next-word-end        # next end-of-word
bind-key -T copy-mode-vi F send -X next-space-end       # next end-of-WORD
bind-key -T copy-mode-vi e send -X cursor-down          # down 1 line
bind-key -T copy-mode-vi E send -X halfpage-down        # down 1/2 screen
bind-key -T copy-mode-vi i send -X cursor-up            # up 1 line
bind-key -T copy-mode-vi I send -X halfpage-up          # up 1/2 screen
bind-key -T copy-mode-vi k send -X search-again         # search again
bind-key -T copy-mode-vi K send -X search-reverse       # search reverse
bind-key -T copy-mode-vi v send -X begin-selection      # visual mode
bind-key -T copy-mode-vi "C-v" send -X rectangle-toggle # visual block
bind-key -T copy-mode-vi y send -X copy-selection       # copy selection
bind-key -T copy-mode-vi Y send -X copy-line            # copy line
bind-key -T copy-mode-vi "C-k" send-keys -X copy-pipe-and-cancel \
  "xclip -selection c"                                  # copy system
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X \
  copy-pipe-and-cancel "xclip -in -selection clipboard"
bind-key p paste-buffer
bind-key P choose-buffer

# -----------------------------------------------------------------------------
# Linux only
# -----------------------------------------------------------------------------
set -g mouse on
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'select-pane -t=; copy-mode -e; send-keys -M'"
bind -n WheelDownPane select-pane -t= \; send-keys -M
bind -n C-WheelUpPane select-pane -t= \; copy-mode -e \; send-keys -M

# hide pane borders when there is only 1 pane
# https://unix.stackexchange.com/a/559059
set-hook -g window-layout-changed 'if-shell -F "#{!=:#{window_panes},1}" "set-option -w pane-border-status top" ; if-shell -F "#{==:#{window_panes},1}" "set-option -w pane-border-status off"'
